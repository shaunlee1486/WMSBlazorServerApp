# nginx.conf reference configuration for hosting Blazor Server behind Nginx reverse proxy

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name wms.example.com;

        # Redirect standard HTTP traffic to HTTPS
        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://app:8080;
            
            # Standard proxy headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forwarded headers
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;

            # Adjust buffers & timeouts for SignalR WebSocket stability
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 300s;
            
            # Disable buffering for WebSockets/SignalR streaming
            proxy_buffering off;
        }
    }
}
